openapi: 3.0.0
info:
  title: Azure DevOps Bug Reader API
  description: API integration for reading and managing Azure DevOps work items and bugs
  version: 2.0.0
  contact:
    name: CodeGame Development Team

servers:
  - url: https://dev.azure.com/{organization}/{project}/_apis
    description: Azure DevOps REST API Endpoint
    variables:
      organization:
        default: enableon
        description: Azure DevOps organization name
      project:
        default: ART%20-%20New%20SaaS
        description: Azure DevOps project name (URL encoded - spaces as %20)

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: Azure DevOps PAT (Personal Access Token) as username with empty password

  schemas:
    WorkItem:
      type: object
      properties:
        id:
          type: integer
          description: Work item ID
        title:
          type: string
          description: Work item title
        description:
          type: string
          description: Work item description
        state:
          type: string
          enum: [New, Active, Resolved, Closed, Removed]
          description: Current state of the work item
        workItemType:
          type: string
          description: Type of work item (Bug, Task, Feature, etc.)
        assignedTo:
          type: object
          properties:
            displayName:
              type: string
            uniqueName:
              type: string
        tags:
          type: array
          items:
            type: string
          description: Tags associated with the work item
        priority:
          type: integer
          description: Priority level (1-4)
        url:
          type: string
          description: Direct URL to the work item
        fields:
          type: object
          description: All work item fields

paths:
  /wit/workitems/{id}:
    get:
      operationId: getWorkItem
      summary: Get a work item by ID
      description: Retrieves details of a specific work item from Azure DevOps
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Work item ID (e.g., 791842)
        - name: $expand
          in: query
          required: false
          schema:
            type: string
            enum: [None, Relations, Fields, All]
          description: Expand related data - use 'All' for complete information
        - name: api-version
          in: query
          required: true
          schema:
            type: string
            default: "7.1"
          description: API version
      security:
        - BasicAuth: []
      responses:
        '200':
          description: Successfully retrieved work item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkItem'
        '401':
          description: Unauthorized - Invalid credentials or PAT expired
        '404':
          description: Work item not found

  /wit/wiql:
    post:
      operationId: searchWorkItems
      summary: Search work items using WIQL
      description: Search for work items using WIQL (Work Item Query Language)
      parameters:
        - name: api-version
          in: query
          required: true
          schema:
            type: string
            default: "7.1"
          description: API version
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: WIQL query
                  example: "SELECT [System.Id] FROM workitems WHERE [System.Tags] CONTAINS 'agent-ready'"
      responses:
        '200':
          description: Successfully retrieved work items
          content:
            application/json:
              schema:
                type: object
                properties:
                  queryType:
                    type: string
                  workItems:
                    type: array
                    items:
                      type: object

  /git/repositories:
    get:
      operationId: getRepositories
      summary: Get all repositories in a project
      description: Retrieves list of Git repositories in the project
      parameters:
        - name: api-version
          in: query
          required: true
          schema:
            type: string
            default: "7.1"
      security:
        - BasicAuth: []
      responses:
        '200':
          description: Successfully retrieved repositories
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  value:
                    type: array

  /git/repositories/{repositoryId}/commits:
    get:
      operationId: getCommits
      summary: Get commits from a repository
      description: Retrieves commit history from a Git repository
      parameters:
        - name: repositoryId
          in: path
          required: true
          schema:
            type: string
          description: Repository ID or name
        - name: api-version
          in: query
          required: true
          schema:
            type: string
            default: "7.1"
      security:
        - BasicAuth: []
      responses:
        '200':
          description: Successfully retrieved commits

  /build/builds:
    get:
      operationId: getBuilds
      summary: Get build logs
      description: Retrieves build information and logs
      parameters:
        - name: api-version
          in: query
          required: true
          schema:
            type: string
            default: "7.1"
      security:
        - BasicAuth: []
      responses:
        '200':
          description: Successfully retrieved builds

  /git/pullrequests:
    post:
      operationId: createPullRequest
      summary: Create a pull request
      description: Creates a new pull request
      parameters:
        - name: api-version
          in: query
          required: true
          schema:
            type: string
            default: "7.1"
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceRefName:
                  type: string
                targetRefName:
                  type: string
                title:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Pull request created successfully

security:
  - BasicAuth: []

tags:
  - name: Work Items
    description: Work item operations
  - name: Repositories
    description: Git repository operations
  - name: Builds
    description: Build operations
  - name: Pull Requests
    description: Pull request operations
